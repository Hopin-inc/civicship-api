  retentionM1: Float

  """Fraction active in m+3."""
  retentionM3: Float

  """Fraction active in m+6."""
  retentionM6: Float
}

"""
API-side alert flags. Boolean only: the server owns the cross-field
judgement, the client just renders the badge.
