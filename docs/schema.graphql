"""
投票テーマの現在フェーズ。
startsAt / endsAt と現在時刻から**レスポンス時点で**計算される値で、DB カラムではない。
長時間開いたままの画面（カウントダウン等）ではクライアント側で古くなるため、
精密な期間判定には startsAt / endsAt を直接比較すること。一覧表示などでは phase を利用して構わない。
