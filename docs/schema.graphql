  reportId: ID!
  sectionKey: String
}

union SubmitReportFeedbackPayload = SubmitReportFeedbackSuccess

type SubmitReportFeedbackSuccess {
  feedback: ReportFeedback!
}

"""One entry-month cohort's retention curve."""
