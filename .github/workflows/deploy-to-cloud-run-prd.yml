name: Deploy to Cloud Run （prd）

on:
  push:
    branches:
      - master

permissions:
  # Caps the reusable workflow's GITHUB_TOKEN to the minimum this caller
  # needs: id-token for WIF, contents: write because the prd caller pushes
  # a release tag after deploy (create_tag=true).
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-cloud-run.yml
    with:
      service: internal
      stage: prd
      environment: co-creation-dao-prod
      dockerfile: Dockerfile
      env_vars: |
        NODE_ENV=production
      publish_apollo: true
      apollo_variant: prod
      deploy_batch: true
      create_tag: true
      tag_prefix: ''
    secrets: inherit
