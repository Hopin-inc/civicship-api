name: Deploy to Cloud Run （prd）

# master への直接 push では trigger しない (本番デプロイは PR merge 経由のみ)。
# `pull_request: closed` + `merged == true` でフィルタすることで、PR が
# merge されずに close されたときも skip される。
on:
  pull_request:
    types: [closed]
    branches: [master]

# concurrency は workflow 単位で 1 本に絞る (異なる PR が同時に master に
# 入っても deploy を直列化)。`github.ref` 単位だと PR ごとに別キューに
# なってしまうため意図的に外す。
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Workflow-level permissions are intentionally read-only. Each job declares
# only the writes it actually needs (Scorecard Token-Permissions: PR #1164):
#   - verify-ci:    checks:read + actions:read (gh api on check-runs)
#   - deploy:       id-token:write (WIF auth only — no contents/security-events)
#   - upload-sarif: security-events:write (Trivy SARIF → Security tab)
#   - create-tag:   contents:write (git tag push, prd only)
# Each write is scoped to a single small downstream job (≤5 steps each),
# limiting the blast radius if any individual step is compromised.
permissions:
  contents: read

jobs:
  # CI が緑かを deploy 前に必ず確認するゲート。`pull_request: closed` は
  # branch protection の required check 状態を一切参照しないため、protection
  # 設定漏れ・admin override / repo settings 変更などで未テストコードが prd
  # に流れる経路を塞ぐ (cf. レビュー指摘 #🔴-1)。本ゲートで CI を strict に
  # 二重検証する。
  #
  # ロジック: merge commit SHA (= master 新 tip) に対する `CI` workflow の
  # check-run を polling し、`success` を確認するまで待つ。`failure` /
  # `cancelled` / `timed_out` を見たら即 fail。タイムアウト (デフォ 25min)
  # 内に決着しなければ fail。
  verify-ci:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: read
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Wait for CI to pass on merge commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
          # `ci.yml` 内 aggregator job 名 (`ci:`)。CI 全体の合否を要約する
          # 唯一の required check として運用されているため、これだけ見れば良い。
          # job 名を変えた場合はここも更新する。
          REQUIRED_CHECK: ci
          POLL_INTERVAL_SECONDS: '20'
          # workflow 全体の timeout-minutes (30) より小さく取り、polling
          # 自体のタイムアウトをジョブ kill より先に走らせる。
          POLL_TIMEOUT_SECONDS: '1500'
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + POLL_TIMEOUT_SECONDS ))
          attempt=0
          while :; do
            attempt=$((attempt + 1))
            now=$(date +%s)
            if [[ "$now" -ge "$deadline" ]]; then
              echo "::error::Timed out waiting ${POLL_TIMEOUT_SECONDS}s for CI check '${REQUIRED_CHECK}' on ${MERGE_SHA}. Deploy aborted."
              exit 1
            fi

            # check-runs API は同名 check の履歴をすべて返す。最新 (= latest)
            # の 1 件を採用 (master push で rerun された場合は最後の状態が真)。
            payload=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/commits/${MERGE_SHA}/check-runs?check_name=${REQUIRED_CHECK}&filter=latest")

            count=$(echo "$payload" | jq '.total_count')
            if [[ "$count" -eq 0 ]]; then
              echo "[attempt ${attempt}] CI check '${REQUIRED_CHECK}' not yet reported on ${MERGE_SHA}; sleeping ${POLL_INTERVAL_SECONDS}s..."
              sleep "$POLL_INTERVAL_SECONDS"
              continue
            fi

            status=$(echo "$payload" | jq -r '.check_runs[0].status')
            conclusion=$(echo "$payload" | jq -r '.check_runs[0].conclusion')
            url=$(echo "$payload" | jq -r '.check_runs[0].html_url')
            echo "[attempt ${attempt}] status=${status} conclusion=${conclusion} url=${url}"

            case "$status" in
              completed)
                case "$conclusion" in
                  success)
                    echo "✅ CI passed on ${MERGE_SHA}"
                    exit 0
                    ;;
                  *)
                    echo "::error::CI check '${REQUIRED_CHECK}' on ${MERGE_SHA} concluded '${conclusion}'. Deploy aborted. See ${url}"
                    exit 1
                    ;;
                esac
                ;;
              *)
                sleep "$POLL_INTERVAL_SECONDS"
                ;;
            esac
          done

  deploy:
    needs: verify-ci
    if: github.event.pull_request.merged == true
    # 最小権限: deploy job (reusable workflow) は WIF auth に必要な OIDC token
    # だけを受け取る。`security-events: write` (Trivy SARIF upload) と
    # `contents: write` (git tag) は下流の専用 job (`upload-sarif`,
    # `create-tag`) に隔離した — 各 job の攻撃面を最小化することで
    # Scorecard Token-Permissions 0 点を解消する (PR #1164)。
    permissions:
      id-token: write
    uses: ./.github/workflows/_deploy-cloud-run.yml
    with:
      stage: prd
      environment: co-creation-dao-prod
      apollo-variant: prod
      node-env: production
      # prd は canary rollout (10% → bake → 5xx チェック → 100%) を強制。
      # 失敗時は前 revision に traffic を戻す。dev 側は `enable-canary: false`
      # で従来通り即 100%。詳細は `_deploy-cloud-run.yml` 参照。
      enable-canary: true
      # destructive DDL (DROP TABLE/COLUMN, ALTER TYPE, RENAME, TRUNCATE,
      # non-CONCURRENTLY DROP INDEX, …) を含む migration を deploy 入口で
      # 検出して fail させる (db:deploy 実行前)。CI の同 scan は advisory
      # なので、prd への fail-closed gate として本入力を true にする。
      # 2-step migration の正規手順は docs/handbook/DB_MIGRATION.md 参照。
      block-destructive-migrations: true
    secrets: inherit

  # Trivy CRITICAL/HIGH の SARIF を Security タブに publish する。reusable
  # deploy job が同名 artifact (`trivy-sarif-prd`) を upload するので、ここで
  # download → codeql-action/upload-sarif で再 upload する。本 job だけが
  # `security-events: write` を持つことで deploy job 本体 (build/push/deploy
  # を含む大きな job) から書き込み権限を取り除ける (Scorecard 対応)。
  #
  # `if: always() && needs.deploy.result != 'cancelled'` で deploy が
  # CRITICAL CVE 検出 (`exit-code: '1'`) や smoke 失敗で fail した場合でも
  # SARIF を publish できるようにする (旧 inline upload と同じ挙動)。
  upload-sarif:
    needs: deploy
    if: ${{ always() && needs.deploy.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Download Trivy SARIF artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: trivy-sarif-prd

      - name: Upload Trivy CRITICAL results to Security tab
        if: ${{ steps.download.outcome == 'success' && hashFiles('trivy-critical.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda # v3.27.1
        with:
          sarif_file: trivy-critical.sarif
          category: trivy-critical

      - name: Upload Trivy HIGH results to Security tab
        if: ${{ steps.download.outcome == 'success' && hashFiles('trivy-high.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda # v3.27.1
        with:
          sarif_file: trivy-high.sarif
          category: trivy-high

  # 本番 deploy 成功時に JST タイムスタンプ tag を打って push する。`contents:
  # write` を持つのは本 job だけ (PR #1164: deploy job から git tag 責務を
  # 切り出して攻撃面を縮小)。`if: success()` でレールに乗らなかった (deploy
  # 失敗) PR では tag が打たれないことを保証する。
  create-tag:
    needs: deploy
    if: ${{ success() && github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout merge commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Create and push timestamp tag
        # TZ env でプロセス単位に JST を効かせる。tzdata の system-wide install
        # は不要 (#986) — apt 経由のネット I/O / sudo が消えるので、harden-runner
        # で `disable-sudo: true` を有効化できる。
        env:
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          TAG_NAME=$(date +"%Y%m%d%H%M%S")
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Created tag: $TAG_NAME"
