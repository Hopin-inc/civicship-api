name: Deploy to Cloud Run （prd）

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-cloud-run.yml
    with:
      service: internal
      stage: prd
      environment: co-creation-dao-prod
      dockerfile: Dockerfile
      env_vars: |
        NODE_ENV=production
      publish_apollo: true
      apollo_variant: prod
      deploy_batch: true
      create_tag: true
      tag_prefix: ''
    secrets: inherit
