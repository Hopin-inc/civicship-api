name: Deploy to Cloud Run （prd）

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-cloud-run.yml
    with:
      stage: prd
      environment: co-creation-dao-prod
      apollo-variant: prod
      node-env: production
      create-git-tag: true
    secrets: inherit
