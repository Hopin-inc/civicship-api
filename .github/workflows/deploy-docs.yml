name: Deploy Docs

# 公開ドキュメントサイト (website/, VitePress) を GitHub Pages へデプロイする。
# develop への push で website/ が変わったときだけ動く。
#
# 公開 URL: https://hopin-inc.github.io/civicship-api/
#
# Pages のソースは「GitHub Actions」を想定（Settings → Pages → Source）。
# 公式 Pages action (upload-pages-artifact / deploy-pages) は full SHA で
# ピン留めし、リポジトリの action 全 SHA ピン留め方針を維持する。

on:
  push:
    branches: [develop]
    paths:
      - "website/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# 権限は job 単位で最小化する。トップレベルで付けると build job にも
# id-token: write が継承され、environment 保護のない job が OIDC トークンを
# 取得できてしまう（セキュリティ指摘の原因）。
permissions:
  contents: read

# Pages への同時デプロイは1つに直列化（実行中をキャンセルしない）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      # website/ は root の pnpm workspace から独立させているので --ignore-workspace。
      # （API 依存を docs ビルドに持ち込まないための分離。）
      - name: Install docs dependencies
        working-directory: website
        run: pnpm install --ignore-workspace

      - name: Build docs
        working-directory: website
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: website/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # OIDC トークン書き込みはこの job だけに限定し、environment で保護する。
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
