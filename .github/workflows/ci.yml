name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master]
  # NOTE: workflow-level の `paths-ignore` は使えない。`ci` aggregator job が
  # branch protection の required status check として登録されているため、
  # paths-ignore で workflow ごと skip すると status が報告されず、docs-only
  # PR が永久に merge 不能になる (admin override が必要になる)。
  # 軽量化が必要になったら job 側で changed-files filter (dorny/paths-filter
  # 等) を使って expensive job (build / test) を条件付き skip し、aggregator は
  # 必ず走る形にする。

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # `dependency-review-action` は PR diff (base..head) で **新規追加された**
  # npm 依存に既知 CVE / 不適合 license が含まれていないかを GitHub の
  # advisory DB に問い合わせて gate する。`pnpm audit` (build job 内、
  # advisory) が lockfile 全体を継続監視するのに対し、こちらは
  # **PR で増えた diff だけ** を高い severity で blocking する役割分担。
  # push (master) や手動 dispatch では動かないため `if: github.event_name`
  # で gating する。aggregator (`ci` job) は `skipped` を success 扱い
  # にしているので push 時は無害に skip される。
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # comment-summary-in-pr で失敗時に PR コメントを起こすため write が必要。
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lint GitHub Actions workflows (actionlint 1.7.7)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            --workdir /repo \
            rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 \
            -color
        # Image: rhysd/actionlint:1.7.7 (Docker Hub, multi-arch index digest)
        # shellcheck / pyflakes are bundled in the image.

      - name: Lint Dockerfiles (hadolint v2.12.0-alpine)
        # Pinned by digest now that the Dockerfiles are clean — no more
        # `continue-on-error`. New violations will block the PR. Two repo-wide
        # decisions are documented inline in each Dockerfile (DL3008 ignore
        # for openssl/ca-certificates, switching SHELL to bash for pipefail
        # support); future inline ignores should follow the same pattern with
        # a justification comment immediately above the offending RUN.
        run: |
          docker run --rm -i \
            -v "${{ github.workspace }}:/repo:ro" \
            hadolint/hadolint@sha256:3c206a451cec6d486367e758645269fd7d696c5ccb6ff59d8b03b0e45268a199 \
            hadolint --config /repo/.hadolint.yaml \
              /repo/Dockerfile /repo/Dockerfile.external

      - name: Setup civicship environment
        uses: ./.github/actions/setup-civicship

      # ESLint は PR #1007 / #1008 / #1009 で issue #978 の backlog (841 errors → 0)
      # を解消したので required check に格上げ。新規違反は CI で落とす。
      # Prettier は formatting backlog (267 files) が残っているので暫定で
      # `::warning::` 降格。一括フォーマット PR で潰したら blocking 化する。
      - name: ESLint check
        run: pnpm exec eslint src/

      - name: Prettier check (non-blocking, formatting backlog from #978)
        run: |
          if ! pnpm exec prettier --check src/; then
            echo '::warning::existing Prettier failures (267 files) — non-blocking until a one-shot prettier --write PR lands'
          fi

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    # Postgres is required because `pnpm db:generate` uses `prisma generate --sql`
    # (TypedSQL). --sql introspects `src/infrastructure/prisma/sql/*.sql` against
    # a live DB to type the `@prisma/client/sql` exports which are imported by
    # src (e.g. refreshMaterializedViewCurrentPoints). Without DB, generate fails
    # and typecheck breaks at import resolution.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: civicship
          POSTGRES_PASSWORD: civicship
          POSTGRES_DB: civicship_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://civicship:civicship@localhost:5432/civicship_ci

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Destructive-migration scan (`pnpm db:migrate-diff`) diffs new
          # migration .sql files against the PR base branch. The default
          # shallow checkout (fetch-depth=1) doesn't include the base ref, so
          # `git merge-base origin/<base>` would fail and the scan would
          # silently no-op. fetch-depth=0 ensures `origin/<base>` is reachable.
          fetch-depth: 0

      - name: Setup civicship environment
        # composite action 内で setup-node の cache: pnpm が working tree の
        # `pnpm-lock.yaml` を hash に使う。`pnpm db:migrate-diff` を後続に
        # 走らせる関係で fetch-depth: 0 (上で設定) は維持する必要がある。
        uses: ./.github/actions/setup-civicship
        with:
          database-url: ${{ env.DATABASE_URL }}
          apply-migrations: 'true'
          generate-graphql: 'true'

      # Surface high/critical findings as a `::warning::` annotation visible
      # in the PR check summary, but do not fail the job (audit results can
      # change independently of code changes; gating CI on transitive
      # vulnerabilities yields a flaky required check). The full audit output
      # is preserved in the step log for triage.
      # `pnpm audit` は npm advisory DB ベースで lockfile 全体 (transitive 含む)
      # を継続監視する。Trivy は image レイヤ (OS / Debian package) しか
      # 見ないので、両者で守備範囲が異なる:
      #   - Trivy: Debian package / Node ランタイムの CVE
      #   - pnpm audit: package.json + 推移的依存の npm advisory
      # `--prod` で devDependencies (jest / eslint plugin 等) を除外し、
      # 本番デプロイに乗らない dev tool の CVE ノイズを advisory から外す。
      # CI runner 上では dev tool もコード実行されるが、production 影響を
      # 切り分けて見たい運用に倒している (dev tool CVE は手動 pnpm audit /
      # Dependabot の生 PR で別途確認可能)。
      - name: Audit (non-blocking, surfaces findings as warnings)
        run: |
          if ! pnpm audit --audit-level=high --prod; then
            echo "::warning::pnpm audit found high-severity vulnerabilities in production deps (non-blocking — see step log for details)"
          fi

      # Surface destructive Prisma migration DDL (DROP TABLE / DROP COLUMN /
      # ALTER COLUMN ... TYPE / RENAME / non-CONCURRENTLY DROP INDEX / ...)
      # added by this PR as `::warning::` annotations on the PR check summary.
      # Non-blocking by design: reviewers decide whether the migration is
      # safe (2-step migration, backfill, view-based replacement). See
      # docs/handbook/DB_MIGRATION.md for the safe-migration playbook.
      - name: Detect destructive Prisma migration DDL (non-blocking)
        if: github.event_name == 'pull_request'
        env:
          MIGRATE_DIFF_BASE_REF: origin/${{ github.base_ref }}
        run: pnpm db:migrate-diff

      # Detect uncommitted regenerations of tracked generated files.
      - name: Check generated files are up to date
        run: |
          git diff --exit-code \
            src/types/graphql.ts \
            docs/schema.graphql \
            src/infrastructure/prisma/schema.prisma

      # NOTE (2026-05): 旧 `Cache TypeScript build info` step (`.tsbuildinfo`
      # を `actions/cache` でブランチ間 fallback restore) は削除した。
      # restore-keys が `tsbuildinfo-${{ runner.os }}-` まで緩く fallback
      # する設定で、別ブランチの古い tsbuildinfo を読んだ tsc が「全ファイル
      # コンパイル済み」と誤判定 → emit を skip → dist の一部が rewrite 前
      # の `@/` を残したまま、という非決定的な build フレイクを起こしていた
      # (`Assert tsc-alias rewrote all @/ imports in dist` step が間欠的に
      # fail)。clean build (~25-30s) で十分速いので cache 復活時はキー
      # 戦略を厳格化する (例: source ファイル hash 込みのキー、fallback
      # 削除) こと。
      - name: Build (typecheck + emit)
        run: pnpm build

      # tsc-alias (in `pnpm build`) is supposed to rewrite every `@/` import in
      # the compiled output to a relative path. The runtime image deliberately
      # does **not** ship `tsconfig-paths/register` or `tsconfig.json` (#1015),
      # so any `@/` import that survives into `dist/` will fail at runtime with
      # `ERR_MODULE_NOT_FOUND`. Catch that drift at PR time rather than at
      # deploy time. `grep -q` exits 0 on first match, so we negate to fail
      # the step when residual `@/` is found.
      #
      # Pattern covers all import shapes that tsc emits / users write:
      #   - Static  : `from "@/x"` / `from '@/x'`
      #   - CJS     : `require("@/x")` / `require('@/x')`
      #   - Dynamic : `import("@/x")` / `import('@/x')`
      # Both single and double quotes are matched so the assertion stays
      # robust against future formatter / source-style changes.
      - name: Assert tsc-alias rewrote all `@/` imports in dist
        env:
          AT_IMPORT_PATTERN: '(from |require\(|import\()["'']@/'
        run: |
          if grep -rqE "$AT_IMPORT_PATTERN" dist/; then
            echo "::error::Found unrewritten \`@/\` imports in dist/. tsc-alias may have failed or a new import shape is not handled. Fix tsc-alias config or restore tsconfig-paths/register."
            grep -rnE "$AT_IMPORT_PATTERN" dist/ | head -20
            exit 1
          fi
          echo "✅ dist/ contains no unresolved \`@/\` imports."

      # Validate that both Dockerfiles actually build with the just-built
      # `node_modules` + `dist` in the build context. This catches Dockerfile
      # syntax / package / COPY-path regressions at PR time instead of at
      # deploy time (cf. the six-hotfix series in May 2026 — #1016, #1017,
      # #1019, #1020, #1021, #1022 — each of which would have surfaced here
      # if this step had existed). `--load` keeps the image local and
      # restricts buildx to the docker driver, no registry push needed.
      # The runtime stage is built (not just the builder) so apt-get install
      # and the pnpm prune + .prisma snapshot/restore path are exercised.
      #
      # `--cache-to type=gha,scope=civicship-trivy,mode=max` writes a layer
      # cache that the separate `trivy` job below reuses via `--cache-from`,
      # so it can rebuild the same image without re-running tsc / pnpm
      # install / apt-get from scratch. mode=max caches all stages, not just
      # the final runtime stage, since trivy needs runtime + builder layers
      # for full coverage.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Validate Dockerfile build (internal API)
        run: |
          docker buildx build \
            --file Dockerfile \
            --target runtime \
            --tag civicship-api:ci-validate \
            --cache-to type=gha,scope=civicship-trivy-internal,mode=max \
            --load \
            .

      - name: Validate Dockerfile build (external API)
        run: |
          docker buildx build \
            --file Dockerfile.external \
            --target runtime \
            --tag civicship-api-external:ci-validate \
            --cache-to type=gha,scope=civicship-trivy-external,mode=max \
            --load \
            .

      # Smoke-test the runtime image: instantiating PrismaClient triggers
      # query-engine binary detection (the OpenSSL-target match that broke
      # in #1022). If the engine binary doesn't match the runtime's libssl,
      # construction throws synchronously and node exits non-zero. We run
      # under the image's default USER (`node`) and don't connect to a DB,
      # so this is a pure load-time check, not a query check.
      - name: Smoke-test runtime image (Prisma engine load)
        run: |
          docker run --rm civicship-api:ci-validate \
            node -e "const { PrismaClient } = require('@prisma/client'); new PrismaClient(); console.log('prisma engine loaded');"

  # ---------------------------------------------------------------------------
  # Trivy CVE scan — split out as its own job (per repo design decision).
  #
  # Why a separate job (vs inline in `build`):
  #   - Independent status check on the PR (visible as `trivy` in the checks
  #     pane instead of buried inside `build`).
  #   - Independent retry: transient Trivy DB fetch errors only re-run this
  #     job, not the full pnpm install + tsc + docker build.
  #   - Logical separation: scanning ≠ artifact production.
  #
  # Severity policy: CRITICAL = **blocking**, HIGH = **advisory** (deploy 側 scan
  # と対称)。
  #   - CRITICAL: table + json で scan、件数 > 0 で末尾 `Surface` step が
  #     `::error::` annotation を出して `exit 1`、aggregator まで failure を
  #     伝播。
  #   - HIGH: json のみ scan (table 省略 — log 汚染回避)。Surface step が
  #     `::warning::` annotation を出すだけで `exit 1` しない (drift が大きい
  #     severity なので gating には使わない)。
  #   - 各 trivy step は `exit-code: '0'` のまま (gating は集計 step に集約)。
  #     こうすると table のヒューマンリーダブル出力 → `::error::` /
  #     `::warning::` → トップ 20 件、の順で揃って出るので reviewer が
  #     「何が落ちた / 何が警告か」を 1 ヶ所で読める。
  #   - aggregator job (`ci`) も `needs.trivy.result` を required 扱いに
  #     上げている (CRITICAL 検出時のみ failure になる構造)。
  #   - blocking 解除 (= advisory に戻す) の条件 / 手順 / 緊急 bypass は
  #     docs/handbook/SECURITY.md "Severity Policy" 参照。
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      # Rebuild the runtime image inheriting the layer cache the `build` job
      # wrote with `--cache-to type=gha,scope=civicship-trivy-*,mode=max`. With
      # all stages cached this finishes in seconds and produces an image
      # bit-for-bit identical to what `build` smoke-tested.
      #
      # Postgres is needed because `pnpm db:generate` uses `prisma generate
      # --sql` (TypedSQL), which introspects the live DB. We use a throwaway
      # local container instead of a service container so this job stays self-
      # contained and doesn't perturb the `build` / `test` job services.
      # Postgres を **composite action 呼び出しより先に** 立てる: composite が
      # 中で `db:deploy` / `db:generate` を流す時点で接続可能である必要がある。
      - name: Spin up local Postgres for prisma generate --sql
        run: |
          set -euo pipefail
          docker run -d \
            --name pg-trivy \
            -e POSTGRES_USER=civicship \
            -e POSTGRES_PASSWORD=civicship \
            -e POSTGRES_DB=civicship_ci \
            -p 5432:5432 \
            postgres:16-alpine
          # Wait up to 30s for Postgres to accept connections. If it never
          # becomes ready, surface container logs and fail explicitly so the
          # follow-up `db:deploy` doesn't blow up with a confusing connection
          # error instead.
          ready=false
          for _ in $(seq 1 30); do
            if docker exec pg-trivy pg_isready -U civicship -d civicship_ci -q; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            echo "::error::Postgres (pg-trivy) did not become ready within 30s"
            docker logs pg-trivy || true
            exit 1
          fi

      # NOTE: trivy needs the build context too, since the multi-stage builder
      # COPYs `node_modules/` and `dist/` from the runner FS. We need pnpm
      # install + db:generate + pnpm build before the `docker buildx` here.
      - name: Setup civicship environment
        uses: ./.github/actions/setup-civicship
        with:
          database-url: postgresql://civicship:civicship@localhost:5432/civicship_ci
          apply-migrations: 'true'
          generate-graphql: 'true'

      - name: Build TypeScript output
        run: pnpm build

      - name: Build images (cache-from gha)
        run: |
          docker buildx build \
            --file Dockerfile \
            --target runtime \
            --tag civicship-api:trivy \
            --cache-from type=gha,scope=civicship-trivy-internal \
            --load \
            .
          docker buildx build \
            --file Dockerfile.external \
            --target runtime \
            --tag civicship-api-external:trivy \
            --cache-from type=gha,scope=civicship-trivy-external \
            --load \
            .

      # Two trivy invocations per image: one with `format: table` for human
      # readable output in the step log, one with `format: json` to a file
      # so the next step can count CRITICAL hits and gate the job. Both use
      # `exit-code: '0'` so the steps always run; gating happens at the end
      # in `Surface CRITICAL count + top hits` (件数 > 0 で `exit 1`)。
      # `.trivyignore` (repo root) は両 invocation で honored される。
      - name: Trivy CRITICAL scan (table — log visibility, internal)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: civicship-api:trivy
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: table

      - name: Trivy CRITICAL scan (json — count parsing, internal)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: civicship-api:trivy
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: json
          output: trivy-internal.json

      - name: Trivy CRITICAL scan (table — log visibility, external)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: civicship-api-external:trivy
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: table

      - name: Trivy CRITICAL scan (json — count parsing, external)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: civicship-api-external:trivy
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: json
          output: trivy-external.json

      # HIGH は **advisory** で scan する (deploy 側 workflow と対称)。CRITICAL
      # と違って drift が大きい severity なので gating はしない (`exit-code: '0'`
      # のまま、Surface step も `::warning::` のみで `exit 1` しない)。
      # PR 段階で件数を可視化することで、deploy 時に初めて気付く運用を防ぐ。
      # table は冗長になるため省略し、json + Surface step での集計のみ。
      - name: Trivy HIGH scan (json — count parsing, internal — advisory)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: civicship-api:trivy
          severity: HIGH
          exit-code: '0'
          ignore-unfixed: true
          format: json
          output: trivy-high-internal.json

      - name: Trivy HIGH scan (json — count parsing, external — advisory)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: civicship-api-external:trivy
          severity: HIGH
          exit-code: '0'
          ignore-unfixed: true
          format: json
          output: trivy-high-external.json

      # Surface CRITICAL count as a `::error::` annotation and **fail the job**
      # if any image has > 0 CRITICAL CVEs. CRITICAL は blocking 政策のため、
      # 件数 > 0 のときは `exit 1` で aggregator まで failure を伝播させる。
      # HIGH は同じ step 内で `::warning::` annotation で件数を出すだけで gate
      # はしない (advisory 政策、deploy 側と対称)。
      # 各 image の先頭 20 件 (pkg + CVE-ID + fix-status) を annotation 直後の
      # log に出すので、reviewer は ::error:: / ::warning:: のサマリと中身を
      # 1 ヶ所で読める。緊急 bypass (false-positive / 上流 fix 待ちが緊急 deploy
      # を止めている) は `.trivyignore` に時限 expiry 付き entry を追加
      # (SECURITY.md 参照)。
      - name: Surface CRITICAL + HIGH count + top hits
        run: |
          set -euo pipefail
          fail=0
          for variant in internal external; do
            crit_json="trivy-${variant}.json"
            high_json="trivy-high-${variant}.json"
            crit_count=$(jq '[.Results[]?.Vulnerabilities[]?] | length' "$crit_json")
            high_count=$(jq '[.Results[]?.Vulnerabilities[]?] | length' "$high_json")
            echo "${variant}: ${crit_count} CRITICAL / ${high_count} HIGH"
            if [ "$crit_count" -gt 0 ]; then
              echo "::error::Trivy found ${crit_count} CRITICAL vulnerabilities in the ${variant} runtime image. Fix the offending package or add a time-boxed entry to .trivyignore (see docs/handbook/SECURITY.md). See trivy job log for the full table."
              jq -r '.Results[]? | select(.Vulnerabilities) | .Vulnerabilities[] | "  \(.PkgName)@\(.InstalledVersion)  \(.VulnerabilityID)  fix=\(.FixedVersion // "<none>")"' "$crit_json" | head -20
              fail=1
            fi
            if [ "$high_count" -gt 0 ]; then
              echo "::warning::Trivy found ${high_count} HIGH vulnerabilities in the ${variant} runtime image. Advisory only — review and update .trivyignore / fix the offending package. See trivy job log for the top hits."
              jq -r '.Results[]? | select(.Vulnerabilities) | .Vulnerabilities[] | "  [HIGH] \(.PkgName)@\(.InstalledVersion)  \(.VulnerabilityID)  fix=\(.FixedVersion // "<none>")"' "$high_json" | head -20
            fi
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Tear down Postgres
        if: always()
        run: docker rm -f pg-trivy 2>/dev/null || true



  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      # test ディレクトリ単位で job 並列化。jest の `--shard` (hash 分散) ではなく
      # matrix.path を positional 引数として渡してテスト対象を絞り込む
      # (Jest の testPathPattern 相当) ことで、job 名が
      # unit / integration / e2e / auth という意味的ラベルになり、失敗した
      # カテゴリが一目で分かる。各 job は独立 Postgres service を持ち、job 内は
      # --runInBand で直列 (DB race 安全)、job 間は並列で高速化する。
      matrix:
        include:
          - name: unit
            path: src/__tests__/unit
          - name: integration
            path: src/__tests__/integration
          - name: e2e
            path: src/__tests__/e2e
          - name: auth
            path: src/__tests__/auth

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: civicship
          POSTGRES_PASSWORD: civicship
          POSTGRES_DB: civicship_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://civicship:civicship@localhost:5432/civicship_ci
      # Test dummy values (production secret は注入しない、test は DI 通過が目的).
      # ローカル CI 相当環境での実測で、dummy 値でも DI container 登録・初期化が
      # pass することを確認済み。実 API call を行う test はステップ 3 で mock 化する。
      ANTHROPIC_API_KEY: dummy-for-testing
      FIREBASE_PROJECT_ID: test-project-id
      FIREBASE_CLIENT_EMAIL: test@test-project.iam.gserviceaccount.com
      FIREBASE_TOKEN_API_KEY: dummy-for-testing
      # PointVerifyClient (src/infrastructure/libs/point-verify/client.ts)
      # は constructor で IDENTUS_API_URL が未設定 / example URL の場合に throw
      # する。DI resolve 時に auth test が graphql schema 全体を
      # container.resolve(...) で構築するため、env が無いと全 auth test が fail
      # する。CI では "example URL でない任意の URL" であれば pass する。
      IDENTUS_API_URL: http://ci-dummy.invalid
      IDENTUS_API_KEY: dummy-for-testing

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # composite が install + db:deploy + db:generate + gql:generate を順に
      # 実行する。`prisma db push` ではなく `db:deploy` が必要な理由は、
      # view (10 個) / materialized view (4 個) を migration.sql のみで定義
      # しており、db push だと view/mv が作られず関連 test が fail するため。
      - name: Setup civicship environment
        uses: ./.github/actions/setup-civicship
        with:
          database-url: ${{ env.DATABASE_URL }}
          apply-migrations: 'true'
          generate-graphql: 'true'

      # ts-jest の transform 結果 cache を matrix 単位で永続化。
      # restore-keys で同一 matrix の最近の cache に fallback し、
      # 変更されていない test file の transform を skip できる。
      - name: Cache Jest transform cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .jest-cache
          key: jest-${{ runner.os }}-${{ matrix.name }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            jest-${{ runner.os }}-${{ matrix.name }}-${{ github.ref_name }}-
            jest-${{ runner.os }}-${{ matrix.name }}-

      - name: Generate test JWT RSA key
        # firebase-admin の内部 JWT 署名 (RS256) 用に、test 専用の使い捨て RSA 2048
        # key を毎回生成する。repo / GitHub Secrets に commit しないことで rotation /
        # 漏洩の懸念を排除。`openssl genpkey -algorithm RSA` の既定出力は PKCS#8
        # (`-----BEGIN PRIVATE KEY-----`) なので追加フラグは不要。
        run: |
          openssl genpkey -algorithm RSA \
            -out /tmp/test-firebase-key.pem \
            -pkeyopt rsa_keygen_bits:2048
          {
            echo "FIREBASE_PRIVATE_KEY<<EOF"
            cat /tmp/test-firebase-key.pem
            echo "EOF"
          } >> "$GITHUB_ENV"
          rm /tmp/test-firebase-key.pem

      - name: Run tests (${{ matrix.name }})
        # pnpm test (= jest --runInBand) に `--` 越しで `--testPathPattern=...`
        # を渡すと、pnpm が `--` を保持したまま jest に forward し、jest 側では
        # `--` 以降が全て positional 扱いとなるため `--testPathPattern=...`
        # 文字列そのものが pattern として解釈され 0 match になる。
        # jest の最初の positional 引数が testPathPattern として扱われる仕様を
        # 利用し、path を positional で渡す。
        # `--coverage` で istanbul coverage を収集。matrix 単位で
        # coverageDirectory を分け、後段の aggregator で merge して PR に
        # 投稿する。閾値 gate は設けず、まず可視化のみ。
        run: pnpm test -- --coverage --coverageDirectory=coverage-${{ matrix.name }} "${{ matrix.path }}"

      - name: Upload coverage artifact (${{ matrix.name }})
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.name }}
          path: coverage-${{ matrix.name }}/
          retention-days: 7
          if-no-files-found: warn

  # Aggregator job: branch protection の required status check として
  # `ci` を維持したまま、実体は lint / build / test の複合結果を集約する。
  # 分割した各 job を required check として列挙すると、matrix の shard 数を
  # 変えるたびに branch protection 設定を更新する必要が出るため、aggregator
  # 1 個に集約することで将来の shard 数変更に branch protection 無変更で追従
  # できる。
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependency-review, lint, build, trivy, test]
    if: always()
    permissions:
      contents: read
      # PR への coverage コメント投稿に必要 (marocchino/sticky-pull-request-comment)。
      pull-requests: write
    steps:
      - name: Verify all required jobs passed
        run: |
          dep_review='${{ needs.dependency-review.result }}'
          lint='${{ needs.lint.result }}'
          build='${{ needs.build.result }}'
          trivy='${{ needs.trivy.result }}'
          test='${{ needs.test.result }}'
          echo "dep_review=$dep_review lint=$lint build=$build trivy=$trivy test=$test"
          # CRITICAL を blocking 化したので trivy も required ジョブに昇格。
          # trivy job 内部で「scan = exit 0、最後に Surface step が件数 > 0 で
          # exit 1」という構造を取っているので、`failure` は CRITICAL 検出
          # または infra (Postgres / buildx 等) クラッシュのいずれか。区別が
          # 必要になったら trivy job 側で step output を立てて aggregator で
          # 分岐する形に拡張する (現時点では「とにかく落ちたら deploy 不可」
          # という挙動で十分)。
          # dependency-review は push (master) 時に if-skip するので
          # `skipped` を success と等価扱いする (case 句で吸収)。
          for j in "$dep_review" "$lint" "$build" "$trivy" "$test"; do
            case "$j" in
              success|skipped) ;;
              *) echo "::error::required job failed: $j"; exit 1 ;;
            esac
          done
          echo "All required jobs passed"

      # 以下、coverage 集約 step。閾値 gate は設けない:
      # coverage の生成や merge が失敗しても aggregator 自体は success を維持し、
      # PR の merge 可能性に影響を与えない (issue #979 方針)。
      - name: Download all coverage artifacts
        if: github.event_name == 'pull_request'
        id: download-coverage
        continue-on-error: true
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          path: coverage-artifacts
          pattern: coverage-*
          merge-multiple: false

      - name: Merge coverage and generate lcov
        if: github.event_name == 'pull_request' && steps.download-coverage.outcome == 'success'
        id: merge-coverage
        continue-on-error: true
        run: |
          set -eu
          mkdir -p coverage-merged coverage-final
          # download-artifact は各 artifact を `coverage-artifacts/<artifact-name>/`
          # 配下に展開する。upload 時の path には `coverage-${name}/` を指定しており、
          # 結果として coverage-final.json は
          # `coverage-artifacts/coverage-<name>/coverage-<name>/coverage-final.json`
          # に置かれる。階層深さに依存しない `find` で全て収集し、matrix 名を
          # ファイル名に埋め込んで coverage-merged/ に集約。nyc merge は input
          # ディレクトリ配下の *.json を全て merge する。
          found=0
          while IFS= read -r -d '' file; do
            # /coverage-<name>/ に含まれる name を抽出して unique なファイル名にする。
            rel="${file#coverage-artifacts/}"
            top="${rel%%/*}"
            cp "$file" "coverage-merged/${top}.json"
            found=$((found + 1))
          done < <(find coverage-artifacts -type f -name 'coverage-final.json' -print0)
          if [ "$found" -eq 0 ]; then
            echo "::warning::no coverage files found to merge"
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # nyc merge: 複数 coverage-final.json を 1 つに統合。
          # nyc report: lcov / text-summary を生成。
          pnpm dlx nyc@17.1.0 merge coverage-merged coverage-final/coverage-final.json
          pnpm dlx nyc@17.1.0 report \
            --temp-dir coverage-merged \
            --report-dir coverage-final \
            --reporter=lcov \
            --reporter=text-summary \
            --reporter=json-summary \
            > coverage-final/text-summary.txt
          echo "has_coverage=true" >> "$GITHUB_OUTPUT"

      - name: Build PR coverage comment
        if: github.event_name == 'pull_request' && steps.merge-coverage.outputs.has_coverage == 'true'
        id: build-comment
        continue-on-error: true
        run: |
          set -eu
          summary_json="coverage-final/coverage-summary.json"
          if [ ! -f "$summary_json" ]; then
            echo "::warning::coverage-summary.json not found; skipping comment"
            exit 0
          fi
          # jq で total の lines / branches / functions / statements を抽出。
          lines_pct=$(jq -r '.total.lines.pct' "$summary_json")
          branches_pct=$(jq -r '.total.branches.pct' "$summary_json")
          functions_pct=$(jq -r '.total.functions.pct' "$summary_json")
          statements_pct=$(jq -r '.total.statements.pct' "$summary_json")
          lines_cov=$(jq -r '.total.lines.covered' "$summary_json")
          lines_tot=$(jq -r '.total.lines.total' "$summary_json")
          branches_cov=$(jq -r '.total.branches.covered' "$summary_json")
          branches_tot=$(jq -r '.total.branches.total' "$summary_json")
          functions_cov=$(jq -r '.total.functions.covered' "$summary_json")
          functions_tot=$(jq -r '.total.functions.total' "$summary_json")
          statements_cov=$(jq -r '.total.statements.covered' "$summary_json")
          statements_tot=$(jq -r '.total.statements.total' "$summary_json")
          {
            echo 'body<<COVERAGE_EOF'
            echo '## Coverage Report'
            echo ''
            echo '| Metric | Coverage | Covered / Total |'
            echo '| --- | ---: | ---: |'
            echo "| Lines | ${lines_pct}% | ${lines_cov} / ${lines_tot} |"
            echo "| Branches | ${branches_pct}% | ${branches_cov} / ${branches_tot} |"
            echo "| Functions | ${functions_pct}% | ${functions_cov} / ${functions_tot} |"
            echo "| Statements | ${statements_pct}% | ${statements_cov} / ${statements_tot} |"
            echo ''
            echo '> Aggregated across all test matrix jobs (unit / integration / e2e / auth). Visualization only — no threshold gate.'
            echo 'COVERAGE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage comment to PR
        if: github.event_name == 'pull_request' && steps.build-comment.outputs.body != ''
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: ci-coverage
          message: ${{ steps.build-comment.outputs.body }}
