name: Deploy to Cloud Run (dev)

on:
  push:
    branches:
      - develop
      - 'epic/**'
      - 'hotfix/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Caller permissions must be a superset of the reusable workflow's permissions
# (`_deploy-cloud-run.yml`: id-token:write + contents:write). Setting them
# explicitly here also silences CodeQL's missing-permissions warning.
permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-cloud-run.yml
    with:
      stage: dev
      environment: dev
      apollo-variant: dev
      node-env: development
      extra-env-vars: |
        ENV=dev
      create-git-tag: false
      # dev は canary を skip し従来通り即 100% で切り替える (ループバック検証
      # を高速化するため)。canary rollout 自体の有効化は prd のみ。
      enable-canary: false
    secrets: inherit
