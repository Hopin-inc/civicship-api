name: Deploy to Cloud Run

on:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-cloud-run.yml
    with:
      service: internal
      stage: dev
      environment: dev
      dockerfile: Dockerfile
      env_vars: |
        NODE_ENV=development
        ENV=dev
      publish_apollo: true
      apollo_variant: dev
      deploy_batch: true
      create_tag: false
    secrets: inherit
