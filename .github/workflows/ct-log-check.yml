name: CT Log Check (civicship.app)

# civicship.app とその subdomain に対し、想定外の CA から TLS 証明書が
# 発行されていないかを Certificate Transparency log (crt.sh) で月次監視する。
#
# 背景:
#   CAA レコードで `pki.goog` (Google Trust Services) のみに発行を制限して
#   いるが、CAA は「CA がチェックを遵守する前提」の宣言であり、CA 側の
#   ミス発行や検証バイパスを物理的に防ぐものではない。CT log は公開証明書が
#   記録される append-only ログなので、「CAA を破って発行された証明書」を
#   事後検出する最後の砦になる。did:web は civicship.app の TLS 証明書の
#   真正性に依存するため、不正発行は DID Document の TLS MITM に直結する。
#
#   tls-dns-posture.yml が CAA レコード「設定」の存在を毎日見るのに対し、
#   本 workflow は実際に「発行された証明書」を見る。役割が異なるため別
#   workflow とし、変化の遅い CT log に合わせて月次で実行する。
#
# 関連: docs/report/did-vc-internalization.md §9.6 / docs/handbook/SECURITY.md
#       (Edge & TLS Hardening)

on:
  schedule:
    # 毎月 1 日 09:00 UTC (JST 18:00)。CT log は変化が遅いので月次で十分。
    - cron: '0 9 1 * *'
  workflow_dispatch: {}

permissions:
  contents: read

# schedule と workflow_dispatch が同時刻に走るのを避ける。
concurrency:
  group: ct-log-check
  cancel-in-progress: false

jobs:
  check-ct-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          # crt.sh / Slack webhook への HTTPS egress が必須なので audit に留める。
          egress-policy: audit
          disable-sudo: true

      # crt.sh の Certificate Transparency 検索 API (output=json) で
      # civicship.app 関連の証明書を取得し、Google Trust Services 以外の CA が
      # 混ざっていないか確認する。ただし fail させるのは did:web の真正性に
      # 直結する重要ホスト (CRITICAL_HOSTS = apex / www / api) を対象とする
      # 想定外 CA に限る。その他のサブドメイン向けの想定外 CA は fail させず
      # `::warning::` でのみ記録する (理由は下記)。重要ホストの想定外 CA を
      # 検出したら step を fail させ、GitHub annotation と (後続 step で) Slack
      # に通知する。
      #
      # なぜホストで絞るか:
      #   q=civicship.app は crt.sh の identity マッチで apex だけでなく全
      #   subdomain にもヒットする。地域マイクロサイトや CMS
      #   (cms./izu./kotohira.civicship.app 等) は Cloudflare Pages / Vercel /
      #   Netlify といった外部 platform で運用され、それらは Sectigo /
      #   Let's Encrypt 経由で edge 証明書を発行する。これらのサブドメインは
      #   apex とは別の (あるいは無い) CAA を持つため、Sectigo 証明書が出ても
      #   CAA 違反でも did:web への脅威でもない。脅威モデル上保護すべきは
      #   CAA を pki.goog にロックした重要ホスト (apex/www/api) なので、fail
      #   条件もそこに限定する (docs/handbook/SECURITY.md "CT Log Monitoring")。
      #   なお wildcard SAN (`*.civicship.app`) は www/api を 1 ラベルで覆うため
      #   重要ホスト扱いで判定する (apex は wildcard では覆われない)。
      #
      # crt.sh は過去の全証明書 (期限切れ含む) を返すため、CAA を pki.goog に
      # ロックする前の歴史的証明書をそのまま見ると恒久的に誤検知する
      # (civicship.app は Cloudflare proxied で、旧構成では Cloudflare Universal
      #  SSL が Cloudflare CA / Sectigo 経由の edge 証明書を発行していた)。
      # 直近 WINDOW_DAYS 日以内に発行 (not_before) された証明書だけを対象とする
      # rolling window 方式とし、月次 cron に対し十分なオーバーラップを取る。
      #
      # crt.sh は過負荷時に HTTP 200 のまま空ボディ / HTML を返すことがあり、
      # curl の --retry は status が成功なら弾けない。有効な JSON が取れるまで
      # bash 側でリトライし、全試行が失敗したら crt.sh のインフラ不調
      # (セキュリティ事象ではない) として `::warning::` 止まりにする — job は
      # 緑のまま、Slack も鳴らさない。月次なので次回 cron で再試行される。
      - name: Check CT logs for civicship.app
        run: |
          set -uo pipefail

          # 有効な JSON が取れるまでリトライ。空 200 / HTML 応答も失敗扱い。
          attempts=5
          body=""
          for i in $(seq 1 "$attempts"); do
            resp=$(curl -sS --max-time 45 "https://crt.sh/?q=civicship.app&output=json" || true)
            if printf '%s' "$resp" | python3 -c "import json,sys; json.load(sys.stdin)" >/dev/null 2>&1; then
              body="$resp"
              echo "crt.sh: 有効な JSON を取得 (試行 ${i}/${attempts})"
              break
            fi
            echo "crt.sh: 非 JSON 応答 (試行 ${i}/${attempts})"
            [ "$i" -lt "$attempts" ] && sleep 20
          done

          if [ -z "$body" ]; then
            # crt.sh のインフラ不調。セキュリティ事象ではないので job は赤に
            # せず warning 止まりにする (月次なので次回 cron で再試行される)。
            echo "::warning::crt.sh が有効な JSON を返しませんでした (${attempts} 回試行)。今回の CT log チェックはスキップします。"
            exit 0
          fi

          printf '%s' "$body" | python3 -c "
          import json, sys
          from datetime import datetime, timedelta, timezone

          # 月次 cron に対し 2x のオーバーラップ。run が 1 回飛んでも取りこぼさない。
          WINDOW_DAYS = 60
          cutoff = datetime.now(timezone.utc) - timedelta(days=WINDOW_DAYS)
          allowed = ['Google Trust Services']
          # did:web の真正性に直結し、CAA を pki.goog にロックしている重要ホスト。
          # これらを対象にした想定外 CA だけを fail 扱いにする。
          CRITICAL_HOSTS = ['civicship.app', 'www.civicship.app', 'api.civicship.app']

          def not_before(cert):
              raw = (cert.get('not_before') or '').strip()
              if not raw:
                  return None
              try:
                  dt = datetime.fromisoformat(raw)
              except ValueError:
                  return None
              return dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)

          def cert_names(cert):
              # crt.sh は common_name と name_value (改行区切りの SAN) を返す。
              names = set()
              cn = (cert.get('common_name') or '').strip().lower()
              if cn:
                  names.add(cn)
              for n in (cert.get('name_value') or '').split('\n'):
                  n = n.strip().lower()
                  if n:
                      names.add(n)
              return names

          def covers(name, host):
              # 完全一致、または wildcard (1 ラベルのみ) マッチ。
              if name == host:
                  return True
              if name.startswith('*.'):
                  suffix = name[1:]  # '.civicship.app'
                  if host.endswith(suffix):
                      label = host[:-len(suffix)]
                      return bool(label) and '.' not in label
              return False

          def matched_critical(cert):
              names = cert_names(cert)
              return {h for h in CRITICAL_HOSTS if any(covers(n, h) for n in names)}

          data = json.load(sys.stdin)
          recent = [c for c in data if (nb := not_before(c)) and nb >= cutoff]

          critical_hits = {}  # issuer -> set(重要ホスト)
          other_hits = {}     # issuer -> set(その他ホスト)
          for c in recent:
              issuer = c.get('issuer_name', '')
              if not issuer or any(a in issuer for a in allowed):
                  continue
              crit = matched_critical(c)
              if crit:
                  critical_hits.setdefault(issuer, set()).update(crit)
              else:
                  other_hits.setdefault(issuer, set()).update(cert_names(c))

          # 重要ホスト以外 (地域マイクロサイト等) の想定外 CA は fail させず警告のみ。
          for issuer, names in sorted(other_hits.items()):
              sample = ', '.join(sorted(names)[:5])
              print(f'::warning::想定外 CA だが did:web 非重要ホスト向けのため fail させない: {issuer} — 対象: {sample}')

          if critical_hits:
              for issuer, names in sorted(critical_hits.items()):
                  tgt = ', '.join(sorted(names))
                  print(f'::error::did:web 重要ホストに想定外の CA を検出 (直近 {WINDOW_DAYS} 日以内に発行): {issuer} — 対象: {tgt}')
              sys.exit(1)

          sep = ', '
          print(f'OK: 直近 {WINDOW_DAYS} 日以内発行の証明書 {len(recent)} 件。重要ホスト ({sep.join(CRITICAL_HOSTS)}) に想定外 CA なし。')
          if other_hits:
              total = sum(len(v) for v in other_hits.values())
              print(f'(参考: 非重要ホスト向けの想定外 CA を {len(other_hits)} issuer / {total} ホストで warning 記録)')
          "

      # 想定外の CA を検出して step が fail したときだけ Slack に投げる
      # (crt.sh 取得失敗は前 step が warning + exit 0 で吸収するため鳴らない)。
      # SLACK_WEBHOOK_INFRA secret 未登録の repo でも step が無声に skip する
      # ように `if` で webhook の有無を確認する。tls-dns-posture.yml と同じ
      # secret / 同じ通知パターン。
      #
      # secrets:
      #   SLACK_WEBHOOK_INFRA  infra channel 宛 Slack incoming webhook URL。
      - name: Slack notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_INFRA: ${{ secrets.SLACK_WEBHOOK_INFRA }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_INFRA:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_INFRA not set; skipping Slack notify."
            exit 0
          fi
          payload=$(cat <<EOF
          {"text":":rotating_light: civicship.app CT log check failed — 想定外の CA を検出。see ${RUN_URL}"}
          EOF
          )
          curl -sS -X POST "$SLACK_WEBHOOK_INFRA" \
            -H 'Content-Type: application/json' \
            -d "$payload"
