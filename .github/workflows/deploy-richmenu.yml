name: Deploy Rich Menu

on:
  workflow_dispatch:
    inputs:
      community:
        description: 'Community ID to deploy (neo88, izu, dais, kibotcha, or "all")'
        required: true
        type: choice
        options:
          - neo88
          - izu
          - dais
          - kibotcha
          - all
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prd
        default: dev

concurrency:
  group: richmenu-${{ github.event.inputs.environment }}-${{ github.event.inputs.community }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    env:
      STAGE: ${{ github.event.inputs.environment }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JUMPBOX_INSTANCE_NAME: ${{ secrets.JUMPBOX_INSTANCE_NAME }}
      JUMPBOX_ZONE: ${{ secrets.JUMPBOX_ZONE }}

    steps:
      # See _deploy-cloud-run.yml for rationale on audit mode.
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@8254fb75a33b976a221574d287e93919e6a36f70 # v2.1.6
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Open jumpbox tunnel
        uses: ./.github/actions/jumpbox-db-tunnel
        with:
          jumpbox-instance-name: ${{ env.JUMPBOX_INSTANCE_NAME }}
          jumpbox-zone: ${{ env.JUMPBOX_ZONE }}
          db-name: ${{ env.DB_NAME }}

      - name: Generate Prisma client and deploy rich menu
        env:
          DATABASE_URL: postgresql://${{ env.DB_USER }}:${{ env.DB_PASSWORD }}@localhost:5432/${{ env.DB_NAME }}
          COMMUNITY: ${{ github.event.inputs.community }}
        run: |
          pnpm db:generate
          if [ "$COMMUNITY" = "all" ]; then
            pnpm richmenu:deploy --all
          else
            pnpm richmenu:deploy --community="$COMMUNITY"
          fi

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/google_compute_engine ~/.ssh/google_compute_engine.pub
