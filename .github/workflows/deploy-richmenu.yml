name: Deploy Rich Menu

on:
  workflow_dispatch:
    inputs:
      community:
        description: 'Community ID to deploy (neo88, izu, dais, kibotcha, or "all")'
        required: true
        type: choice
        options:
          - neo88
          - izu
          - dais
          - kibotcha
          - all
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prd
        default: dev

concurrency:
  group: richmenu-${{ github.event.inputs.environment }}-${{ github.event.inputs.community }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    env:
      STAGE: ${{ github.event.inputs.environment }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JUMPBOX_INSTANCE_NAME: ${{ secrets.JUMPBOX_INSTANCE_NAME }}
      JUMPBOX_ZONE: ${{ secrets.JUMPBOX_ZONE }}

    steps:
      # See _deploy-cloud-run.yml for rationale on audit mode.
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Open jumpbox tunnel
        uses: ./.github/actions/jumpbox-db-tunnel
        with:
          jumpbox-instance-name: ${{ env.JUMPBOX_INSTANCE_NAME }}
          jumpbox-zone: ${{ env.JUMPBOX_ZONE }}
          db-name: ${{ env.DB_NAME }}

      - name: Generate Prisma client and deploy rich menu
        env:
          DATABASE_URL: postgresql://${{ env.DB_USER }}:${{ env.DB_PASSWORD }}@localhost:5432/${{ env.DB_NAME }}
          COMMUNITY: ${{ github.event.inputs.community }}
        run: |
          pnpm db:generate
          if [ "$COMMUNITY" = "all" ]; then
            pnpm richmenu:deploy --all
          else
            pnpm richmenu:deploy --community="$COMMUNITY"
          fi

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/google_compute_engine ~/.ssh/google_compute_engine.pub
