name: Deploy External API to Cloud Run (prd)

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-cloud-run.yml
    with:
      service: external
      stage: prd
      environment: co-creation-dao-prod
      dockerfile: Dockerfile.external
      cloud_run_flags: '--allow-unauthenticated --port=3000'
      env_vars: |
        NODE_ENV=production
      publish_apollo: false
      deploy_batch: false
      create_tag: true
      tag_prefix: 'external-api-'
    secrets: inherit
