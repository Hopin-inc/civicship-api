name: Snyk

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, develop]
  schedule:
    # 毎週月曜 06:00 UTC (JST 15:00) に master を再 scan。新規 advisory が
    # publish されたタイミングをカバー (Trivy は image scan、こちらは npm
    # advisory ベースで担当範囲が異なる)。
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: snyk-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # SNYK_TOKEN が未設定 (= organization で Snyk を未有効化) の場合は
  # silent に skip して green を返す。secret を後追いで設定すれば
  # 自動で scan が回り始める設計。SARIF を Code Scanning に流すので
  # security-events: write を持たせる。
  snyk:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Check SNYK_TOKEN presence
        id: check
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::notice::SNYK_TOKEN is not set; skipping Snyk scan. Add the secret in repo settings to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # composite action は `database-url` 空デフォルトで DB ops を skip し、
      # pnpm + Node + frozen-lockfile install のみ実行する。Snyk は npm advisory
      # ベースなので lockfile + node_modules があれば足りる (DB 不要)。
      # snyk/actions/node を使わない理由: 内部で `npm install` を呼ぶため
      # pnpm workspace protocol / lockfile 解決が壊れる。CLI 直叩きにする。
      - name: Setup civicship environment
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/setup-civicship

      - name: Snyk test (high+ severity, SARIF)
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx --yes snyk@1 test \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif \
            || true

      - name: Upload SARIF to Code Scanning
        if: steps.check.outputs.skip == 'false' && hashFiles('snyk.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: snyk.sarif
          category: snyk
