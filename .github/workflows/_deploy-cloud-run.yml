name: Deploy to Cloud Run (reusable)

# Reusable workflow called by deploy-to-cloud-run-{dev,prd}.yml.
# dev/prd 共通の deploy ロジックを 1 ファイルに集約し、差分は inputs として受け取る。

on:
  workflow_call:
    inputs:
      stage:
        description: '"dev" or "prd" — used for cache scope and STAGE env.'
        type: string
        required: true
      environment:
        description: GitHub Actions environment name (e.g., "dev", "co-creation-dao-prod").
        type: string
        required: true
      apollo-variant:
        description: Apollo Studio graph variant (e.g., "dev", "prod").
        type: string
        required: true
      node-env:
        description: Value to set NODE_ENV in the Cloud Run service.
        type: string
        required: true
      extra-env-vars:
        description: Additional env vars (newline-separated KEY=VAL) for the Cloud Run service.
        type: string
        required: false
        default: ''
      create-git-tag:
        description: Whether to create + push a timestamp git tag (prd only).
        type: boolean
        required: false
        default: false
      enable-canary:
        description: |
          Whether to roll out via canary (10% → 100% with auto-rollback on
          elevated 5xx). When false, the new revision serves 100% of traffic
          immediately on deploy (existing behavior). prd uses canary; dev skips.
        type: boolean
        required: false
        default: false
      canary-error-threshold:
        description: |
          5xx error-rate threshold (fraction, e.g. 0.01 = 1%) above which the
          canary is rolled back. Only applied when `enable-canary` is true.
        type: string
        required: false
        default: '0.01'
      canary-bake-seconds:
        description: |
          How long to bake the 10% canary before evaluating 5xx rate (seconds).
          Only applied when `enable-canary` is true.
        type: string
        required: false
        default: '300'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30

    permissions:
      id-token: write
      # contents:write は git tag push に必要 (prd only)。GHA の `permissions:` は
      # 式で動的に切り替えできないため、両 stage で write を付与する
      # (dev でも実質 read しか使わないので影響なし)。
      contents: write
      # security-events:write は Trivy scan 結果 (sarif) を Security タブに
      # upload するために必要 (codeql-action/upload-sarif)。
      security-events: write

    env:
      STAGE: ${{ inputs.stage }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
      ARTIFACT_REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}
      APPLICATION_NAME: ${{ secrets.APPLICATION_NAME }}
      BATCH_ARTIFACT_REGISTRY: ${{ secrets.BATCH_ARTIFACT_REGISTRY }}
      BATCH_NAME: ${{ secrets.BATCH_NAME }}
      JUMPBOX_INSTANCE_NAME: ${{ secrets.JUMPBOX_INSTANCE_NAME }}
      JUMPBOX_ZONE: ${{ secrets.JUMPBOX_ZONE }}
      APOLLO_KEY: ${{ secrets.APOLLO_KEY }}
      # MAIN_IMAGE / MAIN_IMAGE_SHA を job-level env に出すことで、build/push step
      # と Trivy scan step (build step 後の独立 step) から同じ参照で扱えるように
      # する。`:sha-${{ github.sha }}` は Cloud Run revision を commit 単位で
      # identifiable にし、過去 image にロールバックできるようにするため (#974)。
      # Trivy 側は `MAIN_IMAGE_SHA || MAIN_IMAGE` の fallback で sha tag 優先。
      MAIN_IMAGE: ${{ secrets.ARTIFACT_REGISTRY }}/${{ secrets.APPLICATION_NAME }}:latest
      MAIN_IMAGE_SHA: ${{ secrets.ARTIFACT_REGISTRY }}/${{ secrets.APPLICATION_NAME }}:sha-${{ github.sha }}
      BATCH_IMAGE: ${{ secrets.BATCH_ARTIFACT_REGISTRY }}/${{ secrets.BATCH_NAME }}:latest
      BATCH_IMAGE_SHA: ${{ secrets.BATCH_ARTIFACT_REGISTRY }}/${{ secrets.BATCH_NAME }}:sha-${{ github.sha }}

    steps:
      # `audit` mode: log egress (GCP / npm registry / GitHub) without blocking.
      # `block` mode would require maintaining an allowlist for every gcloud
      # endpoint and is fragile across SDK updates. Audit logs surface in the
      # job summary and let us detect unexpected egress (e.g. credential
      # exfiltration) post-hoc.
      # `disable-sudo: true`: tzdata install を `TZ=Asia/Tokyo` env に置き
      # 換えた (#986) ことで sudo 不要になったため、deploy job 全体で root
      # 昇格を禁止する。これで「step が想定外に root を取得する」攻撃面
      # を一段塞げる。
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || '' }}

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@8254fb75a33b976a221574d287e93919e6a36f70 # v2.1.6
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Open jumpbox tunnel
        uses: ./.github/actions/jumpbox-db-tunnel
        with:
          jumpbox-instance-name: ${{ env.JUMPBOX_INSTANCE_NAME }}
          jumpbox-zone: ${{ env.JUMPBOX_ZONE }}
          db-name: ${{ env.DB_NAME }}

      # composite が install + db:deploy + db:generate + gql:generate を順に
      # 実行する。jumpbox tunnel の後に呼び出すこと (composite 内の DB ops
      # が tunnel 経由で localhost:5432 に接続する)。CI の build/test job と
      # 同じ順序 (db:deploy → db:generate) に揃えており、新規 migration が
      # 追加された場合でも `prisma generate --sql` が migrate 後の DB を
      # introspection して TypedSQL types を生成できる。
      - name: Setup civicship environment
        uses: ./.github/actions/setup-civicship
        with:
          database-url: postgresql://${{ env.DB_USER }}:${{ env.DB_PASSWORD }}@localhost:5432/${{ env.DB_NAME }}
          apply-migrations: 'true'
          generate-graphql: 'true'

      - name: Build TypeScript output (consumed by Docker COPY)
        run: pnpm build

      - name: Configure Docker for GCP Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.ARTIFACT_REGISTRY }}"
          gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      # Dockerfile を統一 (旧 Dockerfile.batch を廃止) し、1 度のビルドで
      # main / batch の両 registry に同じ image を multi-tag push する。
      # batch (Cloud Run Job) 側は entrypoint を `--command/--args` で
      # `node dist/index.js` に上書きする (旧 Dockerfile.batch CMD と等価)。
      # `:sha-${{ github.sha }}` を `:latest` と並列で push することで、
      # Cloud Run の各 revision を commit SHA 単位で identifiable にし、
      # 過去 image にロールバックできるようにする (DEPLOYMENT.md 参照)。
      #
      # `--sbom=true` で SPDX SBOM、`--provenance=mode=max` で SLSA build
      # provenance を attestation として image manifest に attach する。
      # Artifact Registry の image detail / `cosign verify-attestation` /
      # `gcloud artifacts docker images describe --show-package-vulnerability`
      # から検証可能。両 attestation は cache-friendly でビルド時間にほぼ影響
      # しない (実測で +5〜10s 程度)。
      - name: Build unified image and push to main + batch registries
        run: |
          docker buildx build \
            --file Dockerfile \
            --tag "$MAIN_IMAGE" \
            --tag "$MAIN_IMAGE_SHA" \
            --tag "$BATCH_IMAGE" \
            --tag "$BATCH_IMAGE_SHA" \
            --sbom=true \
            --provenance=mode=max \
            --cache-from "type=gha,scope=cloud-run-${{ inputs.stage }}" \
            --cache-to "type=gha,mode=max,scope=cloud-run-${{ inputs.stage }}" \
            --push \
            .

      # Trivy scan は docker push 直後 / Cloud Run deploy 前に走らせる。
      # CRITICAL は **blocking** (`exit-code: '1'`)、HIGH は引き続き **advisory**
      # (`exit-code: '0'`) で運用する。
      #
      # 政策の経緯: 当初は両 severity とも advisory にしていた (Trivy DB の
      # 日次更新で昨日まで clean だった image が今日落ちる、という drift で
      # 無関係な fix が deploy stall を巻き込むのを避けるため)。一定期間 0 件
      # 維持を確認できたので、CRITICAL のみ gate に昇格。HIGH は drift の
      # 余地が大きいので advisory のまま (sarif は引き続き Security タブに
      # 上げて可視化のみ)。
      #
      # blocking 解除 (= advisory に戻す) の条件 / 手順 / 緊急 bypass は
      # docs/handbook/SECURITY.md "Severity Policy" を参照。
      # `ignore-unfixed: true` で fix の出ていない CVE は除外する (上流が
      # 直せない CVE で deploy が永久に止まらないようにする保険)。
      # `limit-severities-for-sarif: true` は **必須**。trivy-action は
      # `format: sarif` のときデフォルトで `severity` フィルタを **無視** して
      # 全 severity を sarif に出力する仕様 (action log に
      # "Building SARIF report with all severities" が出る)。これを有効化しないと
      # `severity: CRITICAL` を指定しても HIGH/MEDIUM の CVE で `exit-code: '1'`
      # が trip し、deploy が誤 block される (#1059 の merge 直後に観測。
      # CI 側 (`ci.yml` の trivy job) は `format: json` で本 quirk の影響を
      # 受けず CRITICAL: 0 のまま通っていたが、deploy 側だけ落ちる症状になった)。
      # 本 flag を入れることで、severity フィルタが json/table と同じく sarif
      # 出力にも適用され、exit-code 判定が本物の CRITICAL のみに限定される。
      # HIGH (advisory) 側は exit-code: '0' で fail しないが、Security タブの
      # category が混ざらないように同様に true に揃える。
      - name: Scan image (Trivy CRITICAL — blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.MAIN_IMAGE_SHA || env.MAIN_IMAGE }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-critical.sarif
          limit-severities-for-sarif: true

      - name: Scan image (Trivy HIGH — advisory)
        # CRITICAL が落ちて job が fail した場合でも HIGH の sarif を生成し
        # 後段で Security タブに upload するため `if: always()` を維持。
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.MAIN_IMAGE_SHA || env.MAIN_IMAGE }}
          severity: HIGH
          exit-code: '0'
          ignore-unfixed: true
          format: sarif
          output: trivy-high.sarif
          limit-severities-for-sarif: true

      # CRITICAL 件数を `::error::` annotation として workflow summary 最上部
      # に上げる (上の scan step が `exit-code: '1'` で既に fail させているが、
      # PR / deploy run のサマリで「何件 / どの CVE か」が一目で分かるよう
      # 件数とトップ 20 を出す)。HIGH は advisory なので `::warning::` のまま。
      - name: Surface Trivy CVE count (CRITICAL=error / HIGH=warning)
        if: always()
        run: |
          set -euo pipefail
          for sev in critical high; do
            sarif="trivy-${sev}.sarif"
            [ -s "$sarif" ] || continue
            count=$(jq '[.runs[]?.results[]?] | length' "$sarif")
            echo "${sev^^}: ${count}"
            [ "$count" -eq 0 ] && continue
            if [ "$sev" = "critical" ]; then
              echo "::error::Trivy CRITICAL: ${count} CVEs in the deployed image — deploy was blocked. Review the Security tab (category: trivy-critical), fix the offending package, or add a time-boxed entry to .trivyignore (see SECURITY.md)."
            else
              echo "::warning::Trivy HIGH: ${count} CVEs in the deployed image. Review the Security tab (category: trivy-high) and update .trivyignore / fix the offending package. Advisory only — deploy not blocked on HIGH."
            fi
          done

      - name: Upload Trivy CRITICAL results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda # v3.27.1
        with:
          sarif_file: trivy-critical.sarif
          category: trivy-critical

      - name: Upload Trivy HIGH results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda # v3.27.1
        with:
          sarif_file: trivy-high.sarif
          category: trivy-high

      # --- Non-canary deploy (dev / 既存挙動) ---------------------------------
      # `enable-canary: false` の場合は従来通り即 100% で切り替える。
      - name: Deploy Internal API to Cloud Run (immediate 100%)
        id: deploy
        if: ${{ !inputs.enable-canary }}
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522 # v2.7.6
        with:
          service: ${{ env.APPLICATION_NAME }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.APPLICATION_NAME }}:sha-${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          env_vars: |
            NODE_ENV=${{ inputs.node-env }}
            ${{ inputs.extra-env-vars }}

      # 即 100% パス専用の smoke。deploy アクションは revision 作成成功までしか
      # 保証しないため、起動時 import error / DB 接続失敗等で workflow が green
      # になるのを防ぐ。canary パスは別の smoke (smoke-canary step) を持つ。
      - name: Smoke check (immediate deploy)
        if: ${{ !inputs.enable-canary }}
        env:
          SERVICE: ${{ env.APPLICATION_NAME }}
          REGION: ${{ env.GCP_REGION }}
        run: |
          URL=$(gcloud run services describe "$SERVICE" --region="$REGION" --format='value(status.url)')
          echo "Smoking $URL/health"
          # retry 9 × delay 10s ≒ 90s. cold start (Prisma + Apollo + DI container 構築)
          # で初回 first-byte が 60s を超えるケースに対応するため retry を増やす。
          # --retry-connrefused: instance がまだ listen 開始してない (connection refused)
          # 状態でも retry 対象にする (デフォルトは HTTP error と timeout のみ)。
          if ! curl --fail --silent --show-error \
                --retry 9 --retry-delay 10 --retry-connrefused \
                --max-time 10 \
                "$URL/health"; then
            echo "::error::Smoke check failed for $SERVICE"
            gcloud logging read \
              "resource.type=cloud_run_revision AND resource.labels.service_name=$SERVICE AND severity>=ERROR" \
              --limit=50 --format='value(timestamp,textPayload,jsonPayload.message)' \
              | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi


      # --- Canary deploy (prd) -----------------------------------------------
      # `enable-canary: true` の場合は新 revision を `--no-traffic --tag canary`
      # で deploy → 10% → bake → 5xx チェック → 100% / rollback の順で切り替え
      # る。失敗時は最後の `Rollback to previous revision` step が前 revision に
      # 全 traffic を戻す (下記 `if: failure()` step 参照)。
      - name: Capture previous active revision (for rollback)
        id: prev-rev
        if: ${{ inputs.enable-canary }}
        run: |
          set -euo pipefail
          # rollback target は「現在 100% traffic を受けている revision」。
          # `status.traffic[0]` は配列順に依存し、過去 deploy で残った canary tag
          # 等が `[0]` を占める edge case があるため、`status.latestReadyRevisionName`
          # (最後に Ready になった revision) を使う。これは Cloud Run の規約上
          # 「現在 serving 中の revision」と一致する。
          PREV_REV=$(gcloud run services describe "${APPLICATION_NAME}" \
            --region="${GCP_REGION}" \
            --format='value(status.latestReadyRevisionName)')
          if [ -z "${PREV_REV}" ]; then
            echo "Could not determine previous revision" >&2
            exit 1
          fi
          echo "Previous revision: ${PREV_REV}"
          echo "previous=${PREV_REV}" >> "$GITHUB_OUTPUT"

      - name: Deploy Internal API to Cloud Run (canary, no traffic)
        id: deploy-canary
        if: ${{ inputs.enable-canary }}
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522 # v2.7.6
        with:
          service: ${{ env.APPLICATION_NAME }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.APPLICATION_NAME }}:sha-${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          # `--no-traffic --tag canary` 相当。新 revision を作るが traffic は
          # 0% のままにしておき、`canary` タグだけ振る (タグ URL で smoke 可)。
          flags: '--no-traffic --tag=canary'
          env_vars: |
            NODE_ENV=${{ inputs.node-env }}
            ${{ inputs.extra-env-vars }}

      - name: Smoke test canary tag URL
        id: smoke-canary
        if: ${{ inputs.enable-canary }}
        run: |
          set -euo pipefail
          # tag URL は `gcloud run services describe` の status.traffic[].url か
          # ら canary tag のものを取る (リージョン固有の `canary---SERVICE-...`
          # ホスト名が返る)。
          # `gcloud run services describe` は `--filter` 非対応なので、
          # `--format=json` で status.traffic を取り出して `jq` で canary tag の
          # URL を抽出する (projection チェーンより読みやすく debug しやすい)。
          CANARY_URL=$(gcloud run services describe "${APPLICATION_NAME}" \
            --region="${GCP_REGION}" \
            --format='json(status.traffic)' \
            | jq -r '.status.traffic[] | select(.tag == "canary") | .url' \
            | head -n 1)
          if [ -z "${CANARY_URL}" ]; then
            echo "Could not resolve canary tag URL" >&2
            exit 1
          fi
          echo "Canary URL: ${CANARY_URL}"
          # canary revision は `--no-traffic` で deploy されているため warming
          # されておらず、cold start (Prisma + Apollo + DI container 構築) が確実に
          # 走る。immediate smoke と同じく 60s 程度は許容しないと初回 hit で false
          # negative する。retry 6 × 10s = 60s。
          if ! curl --fail --silent --show-error \
                --retry 6 --retry-delay 10 --retry-connrefused \
                --max-time 10 \
                "${CANARY_URL}/health"; then
            echo "Canary smoke test failed" >&2
            exit 1
          fi
          echo "Canary smoke OK"

      - name: Shift 10% traffic to canary revision
        id: traffic-10
        if: ${{ inputs.enable-canary }}
        run: |
          set -euo pipefail
          NEW_REV="${{ steps.deploy-canary.outputs.revision }}"
          if [ -z "${NEW_REV}" ]; then
            # フォールバック: deploy-cloudrun action が revision output を返さな
            # い場合は describe で latestCreatedRevision を取得。
            NEW_REV=$(gcloud run services describe "${APPLICATION_NAME}" \
              --region="${GCP_REGION}" \
              --format='value(status.latestCreatedRevisionName)')
          fi
          echo "New revision: ${NEW_REV}"
          echo "new=${NEW_REV}" >> "$GITHUB_OUTPUT"
          gcloud run services update-traffic "${APPLICATION_NAME}" \
            --region="${GCP_REGION}" \
            --to-revisions="${NEW_REV}=10"

      - name: Bake canary (wait for traffic samples)
        if: ${{ inputs.enable-canary }}
        run: sleep "${{ inputs.canary-bake-seconds }}"

      - name: Evaluate canary 5xx rate
        id: evaluate-canary
        if: ${{ inputs.enable-canary }}
        env:
          NEW_REV: ${{ steps.traffic-10.outputs.new }}
          ERROR_THRESHOLD: ${{ inputs.canary-error-threshold }}
          BAKE_SECONDS: ${{ inputs.canary-bake-seconds }}
        run: |
          set -euo pipefail
          # Cloud Monitoring の TimeSeries API を直接叩いて bake 期間中の
          # `run.googleapis.com/request_count` を revision 別に取り、5xx 比率
          # (response_code_class != "2xx") が閾値を超えていないか判定する。
          # gcloud auth は WIF から ADC 経由で利用可能。
          PROJECT_ID=$(gcloud config get-value project)
          ACCESS_TOKEN=$(gcloud auth print-access-token)

          # ISO-8601 (UTC, RFC3339) で start/end を作る。bake 終了時刻が end。
          END_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          START_TS=$(date -u -d "@$(( $(date -u +%s) - BAKE_SECONDS ))" +%Y-%m-%dT%H:%M:%SZ)

          FILTER="metric.type=\"run.googleapis.com/request_count\" \
            AND resource.label.\"service_name\"=\"${APPLICATION_NAME}\" \
            AND resource.label.\"location\"=\"${GCP_REGION}\" \
            AND resource.label.\"revision_name\"=\"${NEW_REV}\""

          RESPONSE=$(curl -sS -G \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            --data-urlencode "filter=${FILTER}" \
            --data-urlencode "interval.startTime=${START_TS}" \
            --data-urlencode "interval.endTime=${END_TS}" \
            --data-urlencode "aggregation.alignmentPeriod=${BAKE_SECONDS}s" \
            --data-urlencode "aggregation.perSeriesAligner=ALIGN_SUM" \
            --data-urlencode "aggregation.crossSeriesReducer=REDUCE_SUM" \
            --data-urlencode "aggregation.groupByFields=metric.label.response_code_class" \
            "https://monitoring.googleapis.com/v3/projects/${PROJECT_ID}/timeSeries")

          echo "Monitoring response:"
          echo "${RESPONSE}"

          # jq で response_code_class 別合計を出す。canary に traffic がまだ
          # ほぼ流れていない (total < 50) 場合は判定保留 = pass 扱いにする
          # (false-positive で rollback してしまうのを避ける)。
          # **5xx 限定で評価する** (旧実装は `!= "2xx"` で 3xx redirect / 4xx client
          # error も「エラー」扱いになっており、normal traffic でも 1% 閾値を
          # 超えて誤 rollback する。サーバ側障害は 5xx に出るため、それだけを見る)。
          TOTAL=$(echo "${RESPONSE}" | jq '[.timeSeries[]?.points[0].value.int64Value | tonumber? // 0] | add // 0')
          ERRORS=$(echo "${RESPONSE}" | jq '[.timeSeries[]? | select(.metric.labels.response_code_class == "5xx") | .points[0].value.int64Value | tonumber? // 0] | add // 0')

          echo "Total requests during bake: ${TOTAL}"
          echo "5xx requests during bake: ${ERRORS}"

          if [ "${TOTAL}" -lt 50 ]; then
            echo "Insufficient traffic (<50 requests) — skipping rate check"
            exit 0
          fi

          # bash の浮動小数比較は awk で
          RATE=$(awk -v e="${ERRORS}" -v t="${TOTAL}" 'BEGIN { if (t==0) print 0; else printf "%.6f", e/t }')
          echo "Error rate: ${RATE} (threshold ${ERROR_THRESHOLD})"
          OVER=$(awk -v r="${RATE}" -v th="${ERROR_THRESHOLD}" 'BEGIN { print (r+0 > th+0) ? 1 : 0 }')
          if [ "${OVER}" = "1" ]; then
            echo "Canary error rate ${RATE} exceeded threshold ${ERROR_THRESHOLD}" >&2
            exit 1
          fi
          echo "Canary error rate within threshold."

      - name: Promote canary to 100%
        if: ${{ inputs.enable-canary && success() }}
        env:
          NEW_REV: ${{ steps.traffic-10.outputs.new }}
        run: |
          set -euo pipefail
          gcloud run services update-traffic "${APPLICATION_NAME}" \
            --region="${GCP_REGION}" \
            --to-revisions="${NEW_REV}=100"

      - name: Rollback to previous revision
        # canary 関連 step のいずれかが失敗した場合に前 revision を 100% に戻
        # す。`if: failure()` は (a) 同 job 内で earlier step が failed の時、
        # (b) `enable-canary: true` でなければ意味が無いので両方を AND。
        if: ${{ failure() && inputs.enable-canary && steps.prev-rev.outputs.previous != '' }}
        env:
          PREV_REV: ${{ steps.prev-rev.outputs.previous }}
        run: |
          set -euo pipefail
          echo "Rolling back: shifting 100% traffic back to ${PREV_REV}"
          gcloud run services update-traffic "${APPLICATION_NAME}" \
            --region="${GCP_REGION}" \
            --to-revisions="${PREV_REV}=100"

      - name: Update Cloud Run Job (batch) to new image
        # docker push :latest alone does not roll the Cloud Run Job to the new
        # image — Cloud Run Jobs pin the image digest at deploy time, so we
        # need an explicit `run jobs update` to create a new revision.
        # `dist/bootstrap/batch.js` 経由で起動することで OpenTelemetry tracing 初期化
        # (`tracingReady` await) を batch ジョブでも有効にする。`tsc-alias` が build
        # 時に `@/` を相対 path に rewrite するため、runtime の
        # `tsconfig-paths/register` は不要 (Dockerfile の CMD と整合)。
        # PROCESS_TYPE=batch は Cloud Run Job 側の env で別途設定されている前提
        # (bootstrap/batch.ts は ../index に dispatch するだけで、batch 分岐自体は
        # src/index.ts:main() が PROCESS_TYPE で判定する)。
        run: |
          gcloud run jobs update "${{ env.BATCH_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --image="${{ env.BATCH_ARTIFACT_REGISTRY }}/${{ env.BATCH_NAME }}:sha-${{ github.sha }}" \
            --command=node \
            --args=dist/bootstrap/batch.js

      # Apollo Studio に schema を publish するのは **main API deploy + smoke OK
      # + batch (Cloud Run Job) 更新 が全部通った後** にする (#986)。
      # 先に publish してしまうと、build / deploy が失敗したときに新 schema だけ
      # が Studio に登録され、サーバ側は旧コードのまま — クライアントが advertised
      # なフィールドを叩いて壊れる、という inconsistency を招く。
      # また、batch update より前に置くと Rover/Apollo 側の一時障害で publish が
      # 落ちた瞬間に main API は新 revision・batch は旧 image という非対称デプロイ
      # で止まるため、batch update の **後ろ** に置く必要がある。
      # デフォルトの `if: success()` 仕様で、immediate path / canary promote 100%
      # のいずれも通った場合だけ走る。canary が rollback された場合は
      # `Rollback to previous revision` step が走った時点で job result が failure
      # 化するので、本 step は skip される (= 旧 schema のまま維持)。
      - name: Publish GraphQL schema to Apollo Studio
        env:
          APOLLO_KEY: ${{ env.APOLLO_KEY }}
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          export PATH="$HOME/.rover/bin:$PATH"
          rover graph publish "civicship-api-jq1988@${{ inputs.apollo-variant }}" --schema ./docs/schema.graphql

      - name: Create Git tag
        # TZ env でプロセス単位に JST を効かせる。tzdata の system-wide install
        # は不要 (#986) — apt 経由のネット I/O / sudo が消えるので、harden-runner
        # で `disable-sudo: true` を有効化できる。
        if: ${{ inputs.create-git-tag }}
        env:
          TZ: Asia/Tokyo
        run: |
          TAG_NAME=$(date +"%Y%m%d%H%M%S")
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/google_compute_engine ~/.ssh/google_compute_engine.pub
