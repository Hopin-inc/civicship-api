# Dependabot configuration for civicship-api.
# Strategy: cooldown + grouping + intentional pinning (方針B).
# Applied uniformly to both `npm` and `github-actions` ecosystems.
# Rationale captured in docs/dependabot-playbook.md section 1.
# - Weekly Monday 06:00 JST aligns with the dependency review routine.
# - Cooldown windows (patch 5d / minor 10d / major 14d) are api-conservative;
#   security updates bypass cooldown and are opened immediately by Dependabot.
# - Grouping: minor+patch updates are grouped to reduce PR noise, while
#   majors open as individual PRs for breaking-change review.
#   - npm: production-patch and dev (minor+patch) grouped; majors individual.
#   - github-actions: all actions (minor+patch) grouped; majors individual.
# - Pinning: workflows reference actions by 40-char commit SHA with a
#   `# vX.Y.Z` comment. Dependabot preserves this style across bumps.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10

    cooldown:
      semver-major-days: 14
      semver-minor-days: 10
      semver-patch-days: 5

    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-patch:
        dependency-type: "production"
        update-types:
          - "patch"

    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 14
      semver-minor-days: 10
      semver-patch-days: 5
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Docker base image digest tracking. Both `Dockerfile` and `Dockerfile.external`
  # pin `node:20-slim@sha256:<digest>` for reproducibility; Dependabot opens a PR
  # when upstream re-tags `node:20-slim` to a new digest. Cooldown matches the
  # other ecosystems so we don't get woken up by every nightly base re-build.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    cooldown:
      semver-major-days: 14
      semver-minor-days: 10
      semver-patch-days: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
