sonar.projectKey=Hopin-inc_civicship-api
sonar.organization=hopin-inc

sonar.projectName=civicship-api
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.spec.ts
sonar.exclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**,**/dist/**,**/node_modules/**,**/src/types/graphql.ts,**/src/infrastructure/prisma/migrations/**

sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage は ci.yml で生成した lcov を別 workflow から渡す想定。
# 同 workflow 内に統合する場合はここに lcov.info path を指定する:
# sonar.javascript.lcov.reportPaths=coverage-final/lcov.info
