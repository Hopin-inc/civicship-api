# ------------------------------
# Report AI Generation Types
# ------------------------------

enum ReportVariant {
  WEEKLY_SUMMARY
  GRANT_APPLICATION
  MEDIA_PR
  PERSONAL_RECAP
  MEMBER_NEWSLETTER
}

enum ReportStatus {
  DRAFT
  APPROVED
  PUBLISHED
  REJECTED
  SUPERSEDED
  SKIPPED
}

enum ReportTemplateScope {
  SYSTEM
  COMMUNITY
}

# Phase 1 admin UI exposure (A-1). `kind` distinguishes generation prompts
# (the body the LLM produces) from judge prompts (the LLM-as-Judge scoring
# pass). The admin UI keeps GENERATION on the main tab and routes JUDGE
# through a separate "system" screen, so the enum surfaces here even
# though prod selection logic continues to filter on it internally.
enum ReportTemplateKind {
  GENERATION
  JUDGE
}

type Report {
  id: ID!
  community: Community!
  variant: ReportVariant!
  periodFrom: Datetime!
  periodTo: Datetime!
  template: ReportTemplate

  # LLM-generation artefacts. All nullable because SKIPPED reports never
  # invoked the model — see `skipReason` for why the run was elided.
  outputMarkdown: String
  model: String
  inputTokens: Int
  outputTokens: Int
  cacheReadTokens: Int

  status: ReportStatus!
  skipReason: String
  publishedAt: Datetime
  publishedByUser: User
  finalContent: String

  regenerateCount: Int!
  parentRun: Report
  regenerations: [Report!]!

  targetUser: User
  generatedByUser: User

  # Feedback (PR-F4). `feedbacks` is paginated for OWNER/MANAGER review;
  # `myFeedback` returns the caller's own submission (if any) so the UI
  # can hide the rating button once submitted. Reachable today through
  # the `reports` / `report` queries (MANAGER+/ADMIN) — MEMBER-level
  # read access to `Report` is not yet exposed, so MEMBER clients rely
  # on the `submitReportFeedback` mutation's response to learn their
  # own submission state. Follow-up to open a MEMBER-accessible read
  # path is tracked in PR-F5.
  feedbacks(first: Int, after: String): ReportFeedbacksConnection!
  myFeedback: ReportFeedback

  createdAt: Datetime!
  updatedAt: Datetime
}

type ReportTemplate {
  id: ID!
  variant: ReportVariant!
  scope: ReportTemplateScope!
  # GENERATION = body-producing prompt. JUDGE = LLM-as-Judge scoring
  # prompt. Exposed so the admin UI can mark / route the two kinds
  # without an extra round trip; Prisma treats `kind` as part of the
  # uniqueness tuple alongside (variant, communityId, version).
  kind: ReportTemplateKind!
  community: Community
  systemPrompt: String!
  userPromptTemplate: String!
  communityContext: String
  model: String!
  temperature: Float
  maxTokens: Int!
  stopSequences: [String!]!
  isEnabled: Boolean!
  # Versioning + A/B control fields (PR-F3). Exposed on the read type so
  # the admin UI can display and round-trip the current values — they
  # are writable via `UpdateReportTemplateInput` on the mutation side.
  version: Int!
  isActive: Boolean!
  experimentKey: String
  trafficWeight: Int!
  updatedByUser: User
  createdAt: Datetime!
  updatedAt: Datetime
}

type ReportEdge implements Edge {
  cursor: String!
  node: Report
}

type ReportsConnection {
  edges: [ReportEdge]
  pageInfo: PageInfo!
  totalCount: Int!
}

# ------------------------------
# Mutation Payloads
# ------------------------------

type GenerateReportSuccess {
  report: Report!
}

union GenerateReportPayload = GenerateReportSuccess

type UpdateReportTemplateSuccess {
  reportTemplate: ReportTemplate!
}

union UpdateReportTemplatePayload = UpdateReportTemplateSuccess

type ApproveReportSuccess {
  report: Report!
}

union ApproveReportPayload = ApproveReportSuccess

type PublishReportSuccess {
  report: Report!
}

union PublishReportPayload = PublishReportSuccess

type RejectReportSuccess {
  report: Report!
}

union RejectReportPayload = RejectReportSuccess

# ------------------------------
# Feedback (PR-F4)
# ------------------------------

enum ReportFeedbackType {
  QUALITY
  ACCURACY
  TONE
  STRUCTURE
  OTHER
}

type ReportFeedback {
  id: ID!
  reportId: ID!
  user: User!
  rating: Int!
  feedbackType: ReportFeedbackType
  sectionKey: String
  comment: String
  createdAt: Datetime!
}

type ReportFeedbackEdge implements Edge {
  cursor: String!
  node: ReportFeedback
}

type ReportFeedbacksConnection {
  edges: [ReportFeedbackEdge]
  pageInfo: PageInfo!
  totalCount: Int!
}

type SubmitReportFeedbackSuccess {
  feedback: ReportFeedback!
}

union SubmitReportFeedbackPayload = SubmitReportFeedbackSuccess

# Aggregate snapshot of feedback / judge signal for a (variant, version)
# pair. Admin-only. `judgeHumanCorrelation` is Pearson's r across
# per-report (judgeScore, avgFeedbackRating) pairs; null when too few
# pairs (< 3) exist to compute a meaningful correlation.
# `correlationWarning` is true iff the correlation is present AND below
# the recalibration threshold (0.7) — a signal that the judge prompt
# needs re-tuning.
#
# `version` is null when the caller did not pin the query to a specific
# revision — the row then rolls up stats across every version of the
# variant. Consumers should branch on null vs. concrete number rather
# than treating them the same.
type ReportTemplateStats {
  variant: ReportVariant!
  version: Int
  avgRating: Float
  feedbackCount: Int!
  avgJudgeScore: Float
  judgeHumanCorrelation: Float
  correlationWarning: Boolean!
}

# Per-template quality row for the A/B comparison screen. `templateId`
# is the row identity (= one prompt revision); fields below describe
# both the template config (version / scope / kind / experimentKey /
# isActive / trafficWeight) and the aggregated quality signals over the
# Reports that used that template. `judgeHumanCorrelation` is null when
# fewer than 3 paired (judge, rating) observations exist; in that
# case `correlationWarning` is false. `correlationWarning=true`
# indicates correlation < 0.7 — judge prompt likely needs re-tuning
# against the human ratings.
type ReportTemplateStatsBreakdownRow {
  templateId: ID!
  version: Int!
  scope: ReportTemplateScope!
  kind: ReportTemplateKind!
  experimentKey: String
  isActive: Boolean!
  isEnabled: Boolean!
  trafficWeight: Int!
  feedbackCount: Int!
  avgRating: Float
  avgJudgeScore: Float
  judgeHumanCorrelation: Float
  correlationWarning: Boolean!
}

type ReportTemplateStatsBreakdownEdge implements Edge {
  cursor: String!
  node: ReportTemplateStatsBreakdownRow
}

type ReportTemplateStatsBreakdownConnection {
  edges: [ReportTemplateStatsBreakdownEdge]
  pageInfo: PageInfo!
  totalCount: Int!
}

# Phase 2 sysAdmin L1: per-community last-publish summary. `community`
# / `lastPublishedReport` are resolved via the existing dataloaders,
# so a 50-row page issues at most two batched lookups regardless of
# how many communities show up. `daysSinceLastPublish` is computed in
# the presenter from `lastPublishedAt` so dormant communities surface
# the gap directly without the caller doing date math.
type AdminReportSummaryRow {
  community: Community!
  lastPublishedReport: Report
  lastPublishedAt: Datetime
  daysSinceLastPublish: Int
  publishedCountLast90Days: Int!
}

type AdminReportSummaryEdge implements Edge {
  cursor: String!
  node: AdminReportSummaryRow
}

type AdminReportSummaryConnection {
  edges: [AdminReportSummaryEdge]
  pageInfo: PageInfo!
  totalCount: Int!
}
