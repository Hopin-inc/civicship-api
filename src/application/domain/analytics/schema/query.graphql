# ------------------------------
# Analytics Dashboard Query
#
# L1 overview surface for sysadmin operators: platform totals plus
# one row per community. Bypasses per-community RLS under the hood
# (ctx.issuer.public) because admins legitimately need to see across
# every community at once.
# ------------------------------
extend type Query {
  """
  L1 dashboard: platform totals plus one row per community. Intended
  for the "is any community stalling?" scan. Community fan-out is
  served with N in-process calls (acceptable at today's community
  count — switch to a GROUP BY implementation once the platform
  exceeds ~20 communities).
  """
  analyticsDashboard(input: AnalyticsDashboardInput): AnalyticsDashboardPayload!
    @authz(rules: [IsAdmin])
}
