# ------------------------------
# Transaction Object Type Definitions
# ------------------------------
type Transaction {
  id: ID!
  reason: TransactionReason!
  comment: String

  fromWallet: Wallet
  fromPointChange: Int
  toWallet: Wallet
  toPointChange: Int

  participation: Participation
  reservation: Reservation

  ticketStatusHistories: [TicketStatusHistory!]

  images: [String!]

  createdByUser: User

  """
  ポイントの旅の全ステップを返します（GRANT起点まで遡るN+1クエリが発生します）。
  transactionsなどのリスト取得での使用は避け、transaction(id) での単体取得時のみ使用してください。
  深さだけ必要な場合は chainDepth を使用してください。
  """
  chain: TransactionChain

  chainDepth: Int

  createdAt: Datetime
  updatedAt: Datetime
}

type TransactionChain {
  depth: Int!
  steps: [TransactionChainStep!]!
}

type TransactionChainStep {
  id: ID!
  reason: TransactionReason!
  points: Int!
  fromUser: TransactionChainUser
  toUser: TransactionChainUser
  createdAt: Datetime!
}

type TransactionChainUser {
  id: ID!
  name: String!
  image: String
}

# ------------------------------
# Transaction Enum Definitions
# ------------------------------
enum TransactionReason {
  POINT_ISSUED
  POINT_REWARD

  ONBOARDING

  DONATION
  GRANT

  TICKET_PURCHASED
  TICKET_REFUNDED

  OPPORTUNITY_RESERVATION_CREATED
  OPPORTUNITY_RESERVATION_CANCELED
  OPPORTUNITY_RESERVATION_REJECTED
}

# ------------------------------
# IncentiveGrant Enum Definitions
# ------------------------------
enum IncentiveGrantType {
  SIGNUP
}

enum IncentiveGrantStatus {
  PENDING
  RETRYING
  COMPLETED
  FAILED
}

enum IncentiveGrantFailureCode {
  INSUFFICIENT_FUNDS
  WALLET_NOT_FOUND
  DATABASE_ERROR
  TIMEOUT
  UNKNOWN
}
