extend type Query {
  nftTokens(
    filter: NftTokenFilterInput
    sort: NftTokenSortInput
    cursor: String
    first: Int
  ): NftTokensConnection!

  nftToken(id: ID!): NftToken
}

input NftTokenFilterInput {
  address: [String!]
  type: [String!]
  """
  指定したコミュニティ内に NftInstance が1件以上存在するトークンに絞る。
  NftToken 自体は community に直接紐付かないため、NftInstance 経由での絞り込みになる。
  portal 側のトークン選択 UI で「このコミュニティに紐付くトークンだけ」を表示するために使用。
  """
  communityId: ID

  and: [NftTokenFilterInput!]
  or: [NftTokenFilterInput!]
  not: NftTokenFilterInput
}

input NftTokenSortInput {
  createdAt: SortDirection
  name: SortDirection
  address: SortDirection
}
