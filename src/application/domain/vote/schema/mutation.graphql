# ------------------------------
# Vote Domain Mutation Definitions
# ------------------------------

extend type Mutation {
  """
  管理者: 投票テーマ・ゲート・ポリシー・選択肢を 1 トランザクションで一括作成。
  Gate.type=NFT かつ PowerPolicy.type=NFT_COUNT の場合、両者の nftTokenId は
  一致していなければならない（バックエンドで検証、違反時は `VALIDATION_ERROR`）。
  詳細は VoteGate 型の説明を参照。
  """
  voteTopicCreate(
    input: VoteTopicCreateInput!
    permission: CheckCommunityPermissionInput
      @deprecated(
        reason: "Use the `x-community-id` request header instead; this argument is ignored when the header is present."
      )
  ): VoteTopicCreatePayload! @authz(rules: [IsCommunityManager])

  """
  管理者: 投票テーマを更新する。UPCOMING フェーズ（投票開始前）のみ許可。
  OPEN / CLOSED フェーズでは `VOTE_TOPIC_NOT_EDITABLE` エラーが返る。
  options は全量置換される（UPCOMING なので投票0件が保証されており安全）。
  gate / powerPolicy も同時に再設定可能。
  """
  voteTopicUpdate(
    id: ID!
    input: VoteTopicUpdateInput!
    permission: CheckCommunityPermissionInput
      @deprecated(
        reason: "Use the `x-community-id` request header instead; this argument is ignored when the header is present."
      )
  ): VoteTopicUpdatePayload! @authz(rules: [IsCommunityManager])

  """
  ユーザー: 投票実行。
  同一 topicId への再投票は **upsert で上書き** される（投票履歴は残らない）。
  投票の取消（withdraw）は現時点で未サポート。
  eligibility と power は呼び出しごとに再チェックされ、NFT_COUNT の場合は呼び出し時点の保有数が新しい power として記録される。
  """
  voteCast(input: VoteCastInput!): VoteCastPayload! @authz(rules: [IsUser])

  """
  管理者: 投票テーマ削除。UPCOMING フェーズ（投票開始前）のみ許可。
  OPEN / CLOSED フェーズでは `VOTE_TOPIC_NOT_EDITABLE` エラーが返る。
  gate / powerPolicy / options は onDelete: Cascade で自動削除される（UPCOMING 限定なので ballots は存在しない）。
  """
  voteTopicDelete(
    id: ID!
    permission: CheckCommunityPermissionInput
      @deprecated(
        reason: "Use the `x-community-id` request header instead; this argument is ignored when the header is present."
      )
  ): VoteTopicDeletePayload! @authz(rules: [IsCommunityManager])
}

input VoteTopicCreateInput {
  communityId: ID!
  title: String!
  description: String
  startsAt: Datetime!
  endsAt: Datetime!
  gate: VoteGateInput!
  powerPolicy: VotePowerPolicyInput!
  options: [VoteOptionInput!]!
}

"""
voteTopicUpdate 用の入力。**既存の全フィールドを置き換える**（部分更新は未サポート）。
options は delete → create で全量置換される。gate / powerPolicy も同様に再生成されるため、
既存の id 値は保持されない点に注意。UPCOMING フェーズ限定で呼ばれるため、投票は存在しない前提。
"""
input VoteTopicUpdateInput {
  title: String!
  description: String
  startsAt: Datetime!
  endsAt: Datetime!
  gate: VoteGateInput!
  powerPolicy: VotePowerPolicyInput!
  options: [VoteOptionInput!]!
}

input VoteGateInput {
  type: VoteGateType!
  "type=NFT のとき必須。MEMBERSHIP のときは無視される。"
  nftTokenId: ID
  "type=MEMBERSHIP のときに任意指定（未指定時は MEMBER 以上で可）。NFT のときは無視される。"
  requiredRole: Role
}

input VotePowerPolicyInput {
  type: VotePowerPolicyType!
  "type=NFT_COUNT のとき必須。FLAT のときは無視される。"
  nftTokenId: ID
}

input VoteOptionInput {
  label: String!
  "0 以上の整数。オプション間で重複不可。"
  orderIndex: Int!
}

input VoteCastInput {
  topicId: ID!
  optionId: ID!
}

# ------------------------------
# Vote Mutation Success Type Definitions
# ------------------------------
type VoteTopicCreateSuccess {
  voteTopic: VoteTopic!
}

type VoteTopicUpdateSuccess {
  voteTopic: VoteTopic!
}

type VoteCastSuccess {
  ballot: VoteBallot!
}

type VoteTopicDeleteSuccess {
  voteTopicId: ID!
}

# ------------------------------
# Vote Mutation Union (Payload) Definitions
# ------------------------------
union VoteTopicCreatePayload = VoteTopicCreateSuccess

union VoteTopicUpdatePayload = VoteTopicUpdateSuccess

union VoteCastPayload = VoteCastSuccess

union VoteTopicDeletePayload = VoteTopicDeleteSuccess
